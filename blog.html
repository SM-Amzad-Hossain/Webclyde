<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- SEO Meta Tags -->
  <title>Our Blogs & Insights | Webclyde | Intelligent & Responsive WebDesign & Development</title>
  <meta name="description" content="Discover fresh perspectives, expert insights, and engaging content across various web design and development topics.">

  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="components/header.css">
  <link rel="stylesheet" href="components/footer.css">
  <link rel="icon" type="image/png" href="Asset/logos/fav_icon webclyde.png">

  <!-- Blog Posts Data -->
  <script src="blog-data.js"></script>
</head>

<body>

  <div id="header-placeholder"></div>

  <main>
    <!-- ==========================================
         BLOG HERO SECTION
         ========================================== -->
    <section class="blog-hero" id="hero">
      <div class="glow-bg glow-bg-1" style="top: 10%; left: 20%; opacity: 0.15;"></div>
      <div class="glow-bg glow-bg-2" style="bottom: 10%; right: 20%; opacity: 0.1;"></div>

      <div class="container ">
        <h1>Our Blogs <span class="text-gradinat"><b>And Insights</b></span></h1>
        <p class="hero-desc">
          Discover fresh perspectives, expert insights, and engaging content across various topics
        </p>

        <!-- Categories & Search filter row -->
        <div class="categories-filter-row">
          <div class="filter-search-wrap">
            <input type="text" class="filter-search-input" placeholder="Search blogs...">
            <button class="filter-search-btn" aria-label="Search">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- ==========================================
         LIGHT THEME CONTENT WRAPPER FOR BLOG
         ========================================== -->
    <div class="blog-light-theme">
      <!-- Glow blobs in the light theme section -->
      <div class="blog-light-glow blog-light-glow-1"></div>
      <div class="blog-light-glow blog-light-glow-2"></div>
      <div class="blog-light-glow blog-light-glow-3"></div>

      <div class="container blog-content-container">
        <!-- Latest Blog Header -->
        <div class="blog-grid-header">
          <h2 class="section-title">Latest <span class="text-gradinat"><b>Blog</b></span></h2>
        </div>

        <!-- Blog Cards Grid -->
        <div class="blog-grid" id="blog-posts-grid">
          <!-- Dynamically populated from JS -->
        </div>

        <!-- ==========================================
             PAGINATION BAR
             ========================================== -->
        <div class="pagination" id="blog-pagination" style="margin-top: 5rem;"></div>
      </div>
    </div>

    <!-- ==========================================
         CTA / FORM SECTION PLACEHOLDER
         ========================================== -->
    <div id="cta-placeholder"></div>
  </main>

  <div id="footer-placeholder"></div>

  <!-- Render Blog Posts Dynamically -->
  <script>
    // Set flag for app.js to use paginated logic
    window.usePagination = true;

    document.addEventListener('DOMContentLoaded', () => {
      const posts = window.blogPosts || [];
      const grid = document.getElementById('blog-posts-grid');
      const filterRow = document.querySelector('.categories-filter-row');
      const searchWrap = document.querySelector('.filter-search-wrap');

      // State Management
      let currentPage = 1;
      const postsPerPage = 12;
      let activeCategory = 'all';
      let searchQuery = '';

      const generateSlug = (text) => {
        return text
          .toString()
          .toLowerCase()
          .replace(/\s+/g, '-')
          .replace(/[^\w\-]+/g, '')
          .replace(/\-\-+/g, '-')
          .replace(/^-+/, '')
          .replace(/-+$/, '');
      };

      // 1. Populate category filter buttons dynamically on load
      if (filterRow && searchWrap) {
        const categories = [];
        const seen = new Set();

        // 1a. Default categories
        const defaultCats = ["Business Development", "Tech", "AI"];
        defaultCats.forEach(cat => {
          const slug = generateSlug(cat);
          if (!seen.has(slug)) {
            seen.add(slug);
            categories.push({ name: cat, slug: slug });
          }
        });

        // 1b. Custom categories from localStorage
        const customCategories = JSON.parse(localStorage.getItem('webclyde_custom_categories')) || [];
        customCategories.forEach(cat => {
          if (cat && cat.trim() !== "") {
            const slug = generateSlug(cat);
            if (!seen.has(slug)) {
              seen.add(slug);
              categories.push({ name: cat, slug: slug });
            }
          }
        });

        // 1c. Categories from active posts
        posts.forEach(post => {
          if (post.category) {
            const slug = post.categorySlug || generateSlug(post.category);
            if (!seen.has(slug)) {
              seen.add(slug);
              categories.push({ name: post.category, slug: slug });
            }
          }
        });

        let buttonsHtml = `<button class="filter-btn active" data-filter="all">All</button>`;
        categories.forEach(cat => {
          buttonsHtml += `<button class="filter-btn" data-filter="${cat.slug}">${cat.name}</button>`;
        });

        filterRow.insertAdjacentHTML('afterbegin', buttonsHtml);
      }

      // 2. Render paginated and filtered posts
      function displayPosts() {
        if (!grid) return;

        // Apply filters
        const filteredPosts = posts.filter(post => {
          const catSlug = post.categorySlug || generateSlug(post.category);
          const matchesCategory = (activeCategory === 'all' || catSlug === activeCategory);
          const matchesSearch = (searchQuery === '' || 
                                 post.title.toLowerCase().includes(searchQuery) || 
                                 post.excerpt.toLowerCase().includes(searchQuery));
          return matchesCategory && matchesSearch;
        });

        const totalPosts = filteredPosts.length;
        const totalPages = Math.ceil(totalPosts / postsPerPage);

        // Clamping currentPage
        if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
        if (currentPage < 1) currentPage = 1;

        const startIndex = (currentPage - 1) * postsPerPage;
        const endIndex = startIndex + postsPerPage;
        const paginatedPosts = filteredPosts.slice(startIndex, endIndex);

        if (paginatedPosts.length === 0) {
          grid.innerHTML = `
            <div style="grid-column: 1 / -1; text-align: center; padding: 4rem 2rem; color: #94a3b8; font-family: var(--font-heading); font-size: 1.2rem;">
              🔍 No posts found matching the active search or category filters.
            </div>
          `;
          renderPagination(0, 1);
          return;
        }

        grid.innerHTML = paginatedPosts.map(post => `
          <article class="blog-card" data-category="${post.categorySlug || generateSlug(post.category)}" style="display: flex; opacity: 1; transform: scale(1);">
            <div class="blog-card-image-wrap">
              <a href="single-blog.html?id=${post.id}">
                <img src="${post.image}" alt="${post.title}">
              </a>
            </div>
            <div class="blog-card-content">
              <div class="blog-card-badge">${post.category}</div>
              <h3><a href="single-blog.html?id=${post.id}">${post.title}</a></h3>
              <p>${post.excerpt}</p>
              <div class="blog-card-footer">
                <span class="blog-card-date">Date: ${post.date}</span>
              </div>
            </div>
          </article>
        `).join('');

        renderPagination(totalPages, currentPage);
      }

      // 3. Render dynamic pagination buttons
      function renderPagination(totalPages, currentPage) {
        const pagination = document.getElementById('blog-pagination');
        if (!pagination) return;

        if (totalPages <= 1) {
          pagination.innerHTML = '';
          return;
        }

        let html = '';

        // Previous button
        if (currentPage > 1) {
          html += `<a href="#" class="page-arrow prev-page" onclick="changePage(event, ${currentPage - 1})">&lt;</a>`;
        } else {
          html += `<a href="#" class="page-arrow prev-page disabled" onclick="event.preventDefault()" style="opacity: 0.4; pointer-events: none;">&lt;</a>`;
        }

        // Page numbers
        const delta = 1; // page offset range
        const range = [];
        for (let i = 1; i <= totalPages; i++) {
          if (i === 1 || i === totalPages || (i >= currentPage - delta && i <= currentPage + delta)) {
            range.push(i);
          }
        }

        let last = 0;
        for (const page of range) {
          if (last) {
            if (page - last === 2) {
              html += `<a href="#" class="page-num" onclick="changePage(event, ${last + 1})">${last + 1}</a>`;
            } else if (page - last > 2) {
              html += `<span class="page-ellipsis">...</span>`;
            }
          }
          const activeClass = page === currentPage ? 'active' : '';
          html += `<a href="#" class="page-num ${activeClass}" onclick="changePage(event, ${page})">${page}</a>`;
          last = page;
        }

        // Next button
        if (currentPage < totalPages) {
          html += `<a href="#" class="page-arrow next-page" onclick="changePage(event, ${currentPage + 1})">&gt;</a>`;
        } else {
          html += `<a href="#" class="page-arrow next-page disabled" onclick="event.preventDefault()" style="opacity: 0.4; pointer-events: none;">&gt;</a>`;
        }

        pagination.innerHTML = html;
      }

      // Exposed global handlers for app.js integration
      window.handleCategoryFilter = function(catSlug) {
        activeCategory = catSlug;
        currentPage = 1;
        displayPosts();
      };

      window.handleSearchChange = function(query) {
        searchQuery = query.toLowerCase();
        currentPage = 1;
        displayPosts();
      };

      window.changePage = function(e, page) {
        e.preventDefault();
        currentPage = page;
        displayPosts();
        
        // Smooth scroll to top of blog list grid
        const gridHeader = document.querySelector('.blog-grid-header');
        if (gridHeader) {
          gridHeader.scrollIntoView({ behavior: 'smooth' });
        }
      };

      // Initial rendering
      displayPosts();
    });
  </script>

  <!-- JS Scripts -->
  <script src="components/components-loader.js"></script>
  <script src="app.js"></script>
</body>

</html>
