<!-- ==========================================
     CTA / FORM SECTION
     ========================================== -->
<section class="cta-section section-padding" id="contact">
  <div class="container">
    <div class="cta-grid">
      <!-- Left CTA Content -->
      <div>
        <div class="cta-badge">
          <img src="Asset/images/WordPress.png" alt="WordPress Certified Developer">
        </div>
        <h2>Ready to Build ⚡ <span class="text-gradinat glow-text"><b>Improve</b></span><br><b><span
              class="text-gradinat glow-text">Your Website?</span></b></h2>
        <p>Let's build a powerful Shopify or WooCommerce store that generates real revenue.</p>

        <a href="#contact" class="btn btn-primary green_border_icon">
          Let's have a Meeting
        </a>
      </div>

      <!-- Right Contact Form Card -->
      <div class="contact-form-card">
        <h2 class="form-title">Submit Your Query</h2>
        <form id="consultation-form">
          <div class="form-row">
            <div class="form-group">
              <label for="full-name">Your Name <span class="required-star">*</span></label>
              <input type="text" id="full-name" required>
            </div>

            <div class="form-group">
              <label for="email-address">Email Address <span class="required-star">*</span></label>
              <input type="email" id="email-address" required>
            </div>
          </div>

          <div class="form-group">
            <label for="website-url">Your website URL</label>
            <input type="url" id="website-url" placeholder="https://example.com">
          </div>

          <div class="form-group">
            <label>Please Select a Package <span class="required-star">*</span></label>
            <div class="radio-group">
              <label class="radio-option">
                <input type="radio" name="project-package" value="development" checked required>
                <span>Development</span>
              </label>
              <label class="radio-option">
                <input type="radio" name="project-package" value="design-dev">
                <span>Design | Development</span>
              </label>
              <label class="radio-option">
                <input type="radio" name="project-package" value="design-dev-content">
                <span>Design | Development | Content</span>
              </label>
            </div>
          </div>

          <div class="form-group">
            <label for="project-details">Tell Us About Your Needs <span class="required-star">*</span></label>
            <textarea id="project-details" required></textarea>
          </div>

          <button type="submit" class="btn-submit">
            Submit Now
          </button>
        </form>
        <div class="contact-direct-email">
          <span class="email-icon-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </SVG>
          </span>
          <a href="mailto:info@webclyde.com">Info@Webclyde.Com</a>
        </div>
      </div>
    </div>
  </div>
</section>
